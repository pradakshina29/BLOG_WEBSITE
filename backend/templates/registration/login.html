{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="post-detail-container" style="max-width: 500px; margin-top: 50px;">
    <h1 style="text-align: center; color: var(--primary-color); margin-bottom: 20px;">Welcome Back</h1>
    
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div style="color: red; font-size: 0.85rem; margin-top: 5px;">
                        {{ field.errors|striptags }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Log In</button>
    </form>
    
    <p style="text-align: center; margin-top: 25px; font-size: 0.95rem;">
        Don't have an account? <a href="{% url 'register' %}">Sign Up here</a>.
    </p>
</div>

<style>
    /* Add basic styling to django's default auth form inputs if not using widget_tweaks */
    .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
    }
</style>
{% endblock %}
