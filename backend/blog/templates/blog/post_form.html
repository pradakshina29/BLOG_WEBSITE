{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="post-detail-container" style="max-width: 600px;">
    <h1 style="margin-bottom: 20px; color: var(--accent-color);">{{ title }}</h1>
    
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div style="color: red; font-size: 0.85rem; margin-top: 5px;">
                        {{ field.errors|striptags }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}
        
        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <button type="submit" class="btn btn-primary">Save Post</button>
            <a href="{% url 'post_list' %}" class="btn">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
