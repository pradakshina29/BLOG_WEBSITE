{% extends 'base.html' %}

{% block title %}Delete Post{% endblock %}

{% block content %}
<div class="post-detail-container" style="max-width: 600px; text-align: center;">
    <h1 style="color: #c92a2a; margin-bottom: 15px;">Delete Post</h1>
    
    <p style="font-size: 1.1rem; margin-bottom: 30px;">
        Are you sure you want to delete the post <strong>"{{ post.title }}"</strong>? This action cannot be undone.
    </p>

    <form method="POST">
        {% csrf_token %}
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button type="submit" class="btn btn-danger">Yes, Delete Post</button>
            <a href="{% url 'post_detail' post.slug %}" class="btn">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
